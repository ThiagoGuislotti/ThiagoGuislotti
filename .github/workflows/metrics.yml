name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create metrics branch if it does not exist
        run: |
          if ! git ls-remote --exit-code --heads origin metrics; then
            git config user.email "actions@github.com"
            git config user.name "github-actions"
            git checkout --orphan metrics
            git rm -rf . --quiet
            git commit --allow-empty -m "chore: initialize metrics branch"
            git push origin metrics
            git checkout ${{ github.ref_name }}
          fi

      - name: Generate overview metrics (commits, PRs, reviews — includes private)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ThiagoGuislotti
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: America/Sao_Paulo
          config_display: large
          filename: github-metrics-overview.svg
          committer_branch: metrics
          committer_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages (includes private repos)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ThiagoGuislotti
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_timezone: America/Sao_Paulo
          filename: github-metrics-languages.svg
          committer_branch: metrics
          committer_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate coding habits (includes private activity)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ThiagoGuislotti
          base: ""
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: America/Sao_Paulo
          filename: github-metrics-habits.svg
          committer_branch: metrics
          committer_token: ${{ secrets.GITHUB_TOKEN }}