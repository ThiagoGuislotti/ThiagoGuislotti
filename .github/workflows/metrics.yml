name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate overview metrics (commits, PRs, reviews — includes private)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ThiagoGuislotti
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: America/Sao_Paulo
          config_display: large
          filename: github-metrics-overview.svg
          committer_branch: metrics
          committer_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages (includes private repos)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ThiagoGuislotti
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_timezone: America/Sao_Paulo
          filename: github-metrics-languages.svg
          committer_branch: metrics
          committer_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate coding habits (includes private activity)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ThiagoGuislotti
          base: ""
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: America/Sao_Paulo
          filename: github-metrics-habits.svg
          committer_branch: metrics
          committer_token: ${{ secrets.GITHUB_TOKEN }}