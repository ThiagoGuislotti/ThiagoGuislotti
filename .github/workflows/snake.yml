name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_dots[]=#eee8f5&color_dots[]=#c084fc&color_dots[]=#9745F5&color_dots[]=#7a35d4&color_dots[]=#5b1fa8
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_dots[]=#161b22&color_dots[]=#3d1a6e&color_dots[]=#6b2db8&color_dots[]=#8b3de8&color_dots[]=#c084fc

      - name: Push output to branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}